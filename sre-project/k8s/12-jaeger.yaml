# --- Jaeger Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: sre-project
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.57
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - containerPort: 16686
          name: web-ui
        - containerPort: 4317
          name: otlp-grpc
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 512Mi
---
# --- Jaeger Service ---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: sre-project
spec:
  type: ClusterIP
  ports:
  - port: 16686
    targetPort: 16686
    name: web-ui
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  selector:
    app: jaeger
