# --- Grafana Datasource ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: sre-project
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
---
# --- Grafana Dashboard Provider ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: sre-project
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: 'SRE Dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
# --- Grafana Dashboard JSON ConfigMap ---
# NOTE: Create this from the JSON file:
#   kubectl create configmap grafana-dashboard-json \
#     --from-file=sre-dashboard.json=infra/dashboards/sre-dashboard.json \
#     -n sre-project
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: sre-project
data: {}
# This will be populated by the deployment script (see README)
---
# --- Grafana Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: sre-project
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.0.0
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources/datasource.yml
          subPath: datasource.yml
        - name: dashboard-provider
          mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
          subPath: dashboards.yml
        - name: dashboard-json
          mountPath: /var/lib/grafana/dashboards
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
      - name: dashboard-provider
        configMap:
          name: grafana-dashboard-provider
      - name: dashboard-json
        configMap:
          name: grafana-dashboard-json
---
# --- Grafana Service (LoadBalancer for external access) ---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: sre-project
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: "sre-project"
spec:
  loadBalancerIP: 20.241.251.58
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    name: http
  selector:
    app: grafana
