# --- Prometheus ConfigMap ---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sre-project
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
    scrape_configs:
      - job_name: 'order-service'
        static_configs:
          - targets: ['order-service:8080']
      - job_name: 'inventory-service'
        static_configs:
          - targets: ['inventory-service:8081']
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
---
# --- Prometheus Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sre-project
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.52.0
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus/prometheus.yml
          subPath: prometheus.yml
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
---
# --- Prometheus Service ---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sre-project
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    name: http
  selector:
    app: prometheus
